<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎天寿资源整理网站</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body {
            background:url('https://s41.ax1x.com/2026/04/18/pe6CbuQ.jpg') no-repeat center center fixed;
            background-size:cover;color:#fff;min-height:100vh;padding:20px;
        }
        .avatar-box {position:absolute;top:20px;right:30px;cursor:pointer}
        .avatar {width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #fff}
        .title-box {text-align:center;margin:40px 0}
        .website-name {font-size:38px;background:rgba(0,0,0,.7);padding:10px 30px;border-radius:10px;display:inline-block}
        .current-menu {text-align:center;background:rgba(0,0,0,.7);padding:15px 30px;border-radius:10px;font-size:22px;color:#ff6600;font-weight:bold;width:60%;margin:0 auto 30px}
        .nav {width:85%;margin:30px auto;background:rgba(0,0,0,.7);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;gap:30px}
        .nav-avatar {width:60px;height:60px;border-radius:50%;border:2px solid #ff6600}
        .nav ul {list-style:none;display:flex;justify-content:center;gap:45px}
        .nav li {position:relative;padding:8px 0}
        .nav a {color:#fff;text-decoration:none;font-size:19px;padding:8px 12px;border-radius:5px;background:rgba(0,0,0,.5);display:block;cursor:pointer}
        .nav a:hover {color:#ff6600;background:rgba(0,0,0,.8)}
        .nav .sub-menu {display:none;position:absolute;top:100%;left:0;background:rgba(0,0,0,.9);border-radius:8px;padding:12px;width:160px;flex-direction:column;gap:10px;z-index:999}
        .nav .sub-menu.show {display:flex}
        .search-box {width:60%;margin:0 auto 40px;text-align:center;background:rgba(0,0,0,.7);padding:20px;border-radius:12px}
        .search-input {width:70%;height:45px;padding:0 15px;font-size:16px;border:none;border-radius:6px 0 0 6px;outline:none}
        .search-btn {height:45px;padding:0 25px;background:#ff6600;color:#fff;border:none;border-radius:0 6px 6px 0;cursor:pointer}
        .blank-box {width:80%;margin:80px auto;padding:40px;background:rgba(0,0,0,.75);border-radius:15px;min-height:400px}
        .page {display:none}
        .page.active {display:block}
        .link-list {margin-top:20px}
        .link-item {padding:10px;background:rgba(255,255,255,.1);margin:5px 0;border-radius:5px;display:flex;justify-content:space-between}
        .link-item a {color:#fff;text-decoration:none}
        .pagination {text-align:center;margin-top:30px}
        .page-btn {padding:8px 15px;background:#ff6600;color:#fff;border:none;border-radius:5px;margin:0 3px;cursor:pointer}

        .admin-modal {
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            background:rgba(0,0,0,.95);padding:30px;border-radius:12px;
            display:none;z-index:9999;width:90%;max-width:800px;
            max-height:80vh;overflow-y:auto;
        }
        .admin-title {color:#ff6600;font-size:28px;margin-bottom:20px;text-align:center}
        .login-box {text-align:center;margin:20px 0}
        .login-box input {padding:12px;font-size:18px;width:300px;border:none;border-radius:6px}
        .login-box button {padding:12px 30px;background:#ff6600;color:#fff;border:none;border-radius:6px;cursor:pointer}
        .admin-form {display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .admin-form select,.admin-form input {padding:10px;font-size:16px;border-radius:5px;border:none;outline:none}
        .admin-form button {padding:10px 20px;background:#ff6600;color:#fff;border:none;border-radius:5px;cursor:pointer}
        .del-btn {background:red;color:#fff;border:none;padding:5px 10px;border-radius:3px;cursor:pointer}
        .close-btn {position:absolute;top:15px;right:20px;font-size:22px;cursor:pointer}
        .go-top {position:fixed;bottom:50px;right:30px;width:50px;height:50px;background:#ff6600;color:#fff;border-radius:50%;text-align:center;line-height:50px;font-size:28px;cursor:pointer;opacity:0}
        .go-top.show {opacity:1}
    </style>
</head>
<body>

<div class="avatar-box" onclick="openAdminModal()">
    <img src="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" class="avatar">
</div>

<div class="title-box"><h1 class="website-name">虎天寿资源整理网站</h1></div>
<div class="current-menu" id="title">当前位置：首页</div>

<div class="nav">
    <img src="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" class="nav-avatar">
    <ul id="navMenuList"></ul>
</div>

<div class="search-box">
    <input class="search-input" id="kw" placeholder="搜索">
    <button class="search-btn" onclick="search()">百度搜索</button>
</div>

<div class="blank-box" id="area">
    <div class="page active" id="home">
        <h2 style="text-align:center;color:#ff6600">欢迎来到虎天寿资源整理网站</h2>
        <br>
        <p style="text-align:center;font-size:18px">点击上方菜单查看内容</p>
    </div>
</div>

<div class="go-top" id="goTop" onclick="window.scrollTo(0,0)">↑</div>

<div class="admin-modal" id="adminModal">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h2 class="admin-title">管理面板</h2>
    <div class="login-box">
        <input type="password" id="pwd" placeholder="密码">
        <button onclick="login()">登录</button>
    </div>
    <div id="adminPanel" style="display:none">
        <div class="admin-form">
            <input id="newTop" placeholder="顶级菜单">
            <button onclick="addTop()">添加顶级菜单</button>
        </div>
        <div class="admin-form">
            <select id="parentSelect"></select>
            <input id="newSub" placeholder="子菜单">
            <button onclick="addSub()">添加子菜单</button>
        </div>
        <hr style="border-color:#ff6600;margin:15px 0">
        <div class="admin-form">
            <select id="menuSelect"></select>
            <select id="pageSelect"></select>
            <input id="linkName" placeholder="名称" style="width:140px">
            <input id="linkUrl" placeholder="网址" style="width:200px">
            <button onclick="addLink()">添加链接</button>
        </div>
        <hr style="border-color:#ff6600;margin:15px 0">
        <div id="allLinks"></div>
    </div>
</div>

<script>
const PWD = "wangyiming87";
let isLogin = false;
let topMenus = {}, subMenus = {}, links = {}, currentPage = {};

const DEFAULT_TOP = {
    top1: { name: "系统镜像" },
    top2: { name: "必装软件" },
    top3: { name: "网站合集" },
    top4: { name: "网络加速器" }
};

const DEFAULT_SUB = {
    mini:    { parent: "top1", name: "微系统" },
    winimg:  { parent: "top1", name: "Win系统镜像" },
    tool:    { parent: "top2", name: "系统工具" },
    game:    { parent: "top2", name: "游戏合集" },
    player:  { parent: "top2", name: "播放软件" },
    zip:     { parent: "top2", name: "解压软件" },
    safe:    { parent: "top2", name: "安全软件" },
    chat:    { parent: "top2", name: "社交软件" }
};

function init() {
    let t = localStorage.getItem("topMenus");
    let s = localStorage.getItem("subMenus");
    let l = localStorage.getItem("resourceLinks");

    topMenus = t ? JSON.parse(t) : DEFAULT_TOP;
    subMenus = s ? JSON.parse(s) : DEFAULT_SUB;
    links = l ? JSON.parse(l) : {};

    for (let id in topMenus) ensurePage(id);
    for (let id in subMenus) ensurePage(id);

    buildNav();
    refreshSelects();
    showPage("首页", "home");
}

function ensurePage(id) {
    if (!links[id]) links[id] = {1:[]};
    if (document.getElementById(id)) return;
    let area = document.getElementById("area");
    let div = document.createElement("div");
    div.className = "page";
    div.id = id;
    div.innerHTML = `<div id="list_${id}" class="link-list"></div><div id="page_${id}" class="pagination"></div>`;
    area.appendChild(div);
}

function buildNav() {
    let ul = document.getElementById("navMenuList");
    ul.innerHTML = "";
    ul.innerHTML += `<li><a onclick="showPage('首页','home')">首页</a></li>`;

    for (let tid in topMenus) {
        let subs = Object.keys(subMenus).filter(sid => subMenus[sid].parent == tid);
        if (subs.length > 0) {
            let li = `<li><a onclick="toggle(this)">${topMenus[tid].name}</a><ul class="sub-menu">`;
            subs.forEach(sid => {
                li += `<li><a onclick="showPage('${subMenus[sid].name}','${sid}')">${subMenus[sid].name}</a></li>`;
            });
            li += `</ul></li>`;
            ul.innerHTML += li;
        } else {
            ul.innerHTML += `<li><a onclick="showPage('${topMenus[tid].name}','${tid}')">${topMenus[tid].name}</a></li>`;
        }
    }
}

function toggle(a) {
    let sub = a.nextElementSibling;
    document.querySelectorAll(".sub-menu").forEach(m => m.classList.remove("show"));
    sub.classList.toggle("show");
}

function showPage(name, id) {
    document.getElementById("title").innerText = "当前位置：" + name;
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    let el = document.getElementById(id);
    if (el) el.classList.add("active");
    if (id != "home") renderPage(id);
}

function renderPage(id) {
    ensurePage(id);
    if (!currentPage[id]) currentPage[id] = 1;
    let p = currentPage[id];
    let list = links[id][p] || [];
    let listDom = document.getElementById("list_" + id);
    let pageDom = document.getElementById("page_" + id);

    listDom.innerHTML = "";
    list.forEach(i => {
        listDom.innerHTML += `<div class="link-item"><a href="${i.url}" target="_blank">${i.name}</a></div>`;
    });

    pageDom.innerHTML = "";
    for (let i in links[id]) {
        pageDom.innerHTML += `<button class="page-btn" onclick="goPage('${id}',${i})">第${i}页</button>`;
    }
}

function goPage(id, p) {
    currentPage[id] = p;
    renderPage(id);
}

function refreshSelects() {
    let pSel = document.getElementById("parentSelect");
    let mSel = document.getElementById("menuSelect");
    pSel.innerHTML = mSel.innerHTML = "";

    for (let id in topMenus) {
        pSel.innerHTML += `<option value="${id}">${topMenus[id].name}</option>`;
        mSel.innerHTML += `<option value="${id}">${topMenus[id].name}</option>`;
    }
    for (let id in subMenus) {
        mSel.innerHTML += `<option value="${id}">${subMenus[id].name}</option>`;
    }
    refreshPages();
}

function refreshPages() {
    let id = document.getElementById("menuSelect").value;
    let sel = document.getElementById("pageSelect");
    sel.innerHTML = "";
    if (links[id]) for (let p in links[id]) {
        sel.innerHTML += `<option value="${p}">第${p}页</option>`;
    }
}

function addTop() {
    let name = document.getElementById("newTop").value.trim();
    if (!name) return;
    let id = "t" + Date.now();
    topMenus[id] = {name};
    save();
    buildNav();
    refreshSelects();
    ensurePage(id);
}

function addSub() {
    let parent = document.getElementById("parentSelect").value;
    let name = document.getElementById("newSub").value.trim();
    if (!name) return;
    let id = "s" + Date.now();
    subMenus[id] = {parent, name};
    save();
    buildNav();
    refreshSelects();
    ensurePage(id);
}

function addLink() {
    let id = document.getElementById("menuSelect").value;
    let p = document.getElementById("pageSelect").value;
    let name = document.getElementById("linkName").value.trim();
    let url = document.getElementById("linkUrl").value.trim();
    if (!name || !url) return alert("请填写名称和网址");

    if (!links[id]) links[id] = {1:[]};
    if (!links[id][p]) links[id][p] = [];
    links[id][p].push({name, url});
    save();
    renderPage(id);
    refreshList();
    document.getElementById("linkName").value = "";
    document.getElementById("linkUrl").value = "";
    alert("添加成功！");
}

function save() {
    localStorage.setItem("topMenus", JSON.stringify(topMenus));
    localStorage.setItem("subMenus", JSON.stringify(subMenus));
    localStorage.setItem("resourceLinks", JSON.stringify(links));
}

function refreshList() {
    let dom = document.getElementById("allLinks");
    dom.innerHTML = "<h3>已添加链接</h3>";
    for (let id in links) {
        for (let p in links[id]) {
            links[id][p].forEach((i, idx) => {
                dom.innerHTML += `<div class="link-item">${i.name}<button class='del-btn' onclick='del("${id}",${p},${idx})'>删除</button></div>`;
            });
        }
    }
}

function del(id, p, idx) {
    links[id][p].splice(idx, 1);
    save();
    renderPage(id);
    refreshList();
}

function login() {
    if (document.getElementById("pwd").value == PWD) {
        isLogin = true;
        document.querySelector(".login-box").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        refreshList();
    }
}

function openAdminModal() {
    document.getElementById("adminModal").style.display = "block";
}

function closeModal() {
    document.getElementById("adminModal").style.display = "none";
}

function search() {
    let w = document.getElementById("kw").value;
    if (w) window.open("https://www.baidu.com/s?wd=" + w);
}

window.onscroll = () => {
    document.getElementById("goTop").classList.toggle("show", window.scrollY > 300);
};

init();
</script>
</body>
</html>
