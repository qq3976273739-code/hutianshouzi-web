<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "微软雅黑", system-ui, sans-serif; cursor: default; }

            background: url('https://s41.ax1x.com/2026/04/18/pe6CbuQ.jpg') no-repeat center center fixed;

        }

        .current-menu {

        .nav {

            backdrop-filter: blur(12px);
            border-radius: 28px;

            display: flex; align-items: center; justify-content: center; gap: 30px;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .nav-avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #ff6600; object-fit: cover; cursor: pointer; }
        .nav ul { list-style: none; display: flex; justify-content: center; gap: 35px; flex-wrap: wrap; }
        .nav li { position: relative; padding: 6px 0; }
        .nav a {
            color: #fff; text-decoration: none; font-size: 18px; font-weight: 500;

</head>

<script>
    // ---------- 核心数据结构 ----------
    let topMenus = {};
    let subMenus = {};
    let resourceLinks = {};
    let extraPages = {};
    let subNavList = [];
    let isLogin = false;
    let currentPage = {};

    const ADMIN_PASSWORD = "wangyiming87";
    const CLOUD_URL = "https://raw.githubusercontent.com/qq3976273739-code/my-site-data/refs/heads/main/data.json";

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function saveToLocal() {
        localStorage.setItem('topMenus', JSON.stringify(topMenus));
        localStorage.setItem('subMenus', JSON.stringify(subMenus));
        localStorage.setItem('resourceLinks', JSON.stringify(resourceLinks));
        localStorage.setItem('extraPages', JSON.stringify(extraPages));
        localStorage.setItem('subNavList', JSON.stringify(subNavList));
    }

    // 修复数据结构：确保每个菜单在 resourceLinks 中都有至少第一页
    function repairData() {
        for (let id in topMenus) {
            if (!resourceLinks[id] || typeof resourceLinks[id] !== 'object') resourceLinks[id] = { 1: [] };
            if (Object.keys(resourceLinks[id]).length === 0) resourceLinks[id][1] = [];
        }
        for (let id in subMenus) {
            if (!resourceLinks[id] || typeof resourceLinks[id] !== 'object') resourceLinks[id] = { 1: [] };
            if (Object.keys(resourceLinks[id]).length === 0) resourceLinks[id][1] = [];
        }
        for (let id in extraPages) {
            if (!resourceLinks[id] || typeof resourceLinks[id] !== 'object') resourceLinks[id] = { 1: [] };
            if (Object.keys(resourceLinks[id]).length === 0) resourceLinks[id][1] = [];
        }
        saveToLocal();
        // 刷新所有 UI
        rebuildNav();
        renderSubNav();
        renderAllSelects();
        renderList();
        // 刷新当前页面内容
        let activeId = document.querySelector('.page.active')?.id;
        if (activeId && activeId !== 'home') loadData(activeId);
        alert("✅ 数据结构已修复，缺失页面已补齐。");
    }

    // 云端拉取并覆盖本地（启动时调用）
    async function fetchCloudAndOverwrite() {
        try {
            const resp = await fetch(CLOUD_URL, { cache: "no-cache" });
            if (!resp.ok) throw new Error("HTTP " + resp.status);
            const data = await resp.json();
            if (data && typeof data === "object") {
                topMenus = data.topMenus || {};
                subMenus = data.subMenus || {};
                resourceLinks = data.resourceLinks || {};
                extraPages = data.extraPages || {};
                subNavList = data.subNavList || [];
                repairData();  // 内部会 save 并刷新 UI
                console.log("✅ 云端数据加载成功");
                return true;
            }
        } catch (err) {
            console.warn("云端加载失败", err);
        }
        // 如果云端失败，尝试从本地加载
        let t = localStorage.getItem('topMenus');
        let s = localStorage.getItem('subMenus');
        let r = localStorage.getItem('resourceLinks');
        let e = localStorage.getItem('extraPages');
        let sn = localStorage.getItem('subNavList');
        if (t && s && r) {
            topMenus = JSON.parse(t);
            subMenus = JSON.parse(s);
            resourceLinks = JSON.parse(r);
            extraPages = e ? JSON.parse(e) : {};
            subNavList = sn ? JSON.parse(sn) : {};
        } else {
            // 默认空数据，但为了演示，创建示例顶级菜单
            topMenus = { "top_example": { name: "示例菜单" } };
            subMenus = {};
            resourceLinks = { "top_example": { 1: [{ name: "示例链接", url: "https://www.baidu.com" }] } };
            extraPages = {};
            subNavList = [];
        }
        repairData();
        return false;
    }

    // 导入备份文件（动态替换，不刷新页面）
    function importBackupFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            let rawText = e.target.result;
            if (rawText.charCodeAt(0) === 0xFEFF) rawText = rawText.slice(1);
            try {
                let data = JSON.parse(rawText);
                topMenus = data.topMenus || {};
                subMenus = data.subMenus || {};
                resourceLinks = data.resourceLinks || {};
                extraPages = data.extraPages || {};
                subNavList = data.subNavList || [];
                repairData();  // 修复并刷新所有 UI
                alert("✅ 备份恢复成功！");
            } catch (err) {
                alert("文件解析失败：" + err.message);
            }
        };
        reader.onerror = () => alert("读取文件失败");
        reader.readAsText(file);
    }

        };

    // ------------------ UI 渲染核心 ------------------
    function ensurePageContainer(id, name) {
        if (document.getElementById(id)) return;
        let area = document.getElementById('area');
        let div = document.createElement('div');
        div.className = 'page';
        div.id = id;
        div.innerHTML = `<h2 style="color:#ff6600">【${escapeHtml(name)}】</h2><div class="link-list" id="box_${id}"></div><div class="pagination" id="pagebtn_${id}"></div>`;
        area.appendChild(div);
    }

    function rebuildNav() {
        let ul = document.getElementById('navMenuList');
        ul.innerHTML = '<li><a onclick="showPage(\'首页\',\'home\')">首页</a></li>';
        for (let tid in topMenus) {
            let top = topMenus[tid];
            let children = Object.values(subMenus).filter(c => c.parentId === tid);
            let li = document.createElement('li');
            if (children.length) {
                li.innerHTML = `<a onclick="toggleMenu(this)">${escapeHtml(top.name)}</a><ul class="sub-menu"></ul>`;
                let subUl = li.querySelector('.sub-menu');
                children.forEach(c => {
                    let childLi = document.createElement('li');
                    childLi.innerHTML = `<a onclick="showPage('${escapeHtml(c.name)}','${c.id}')">${escapeHtml(c.name)}</a>`;
                    subUl.appendChild(childLi);
                });
            } else {
                li.innerHTML = `<a onclick="showPage('${escapeHtml(top.name)}','${tid}')">${escapeHtml(top.name)}</a>`;
            }
            ul.appendChild(li);
            ensurePageContainer(tid, top.name);
        }
        for (let sid in subMenus) ensurePageContainer(sid, subMenus[sid].name);
        for (let eid in extraPages) ensurePageContainer(eid, extraPages[eid].name);
    }

    function renderSubNav() {
        let box = document.getElementById('subNavBox');
        box.innerHTML = '';
        subNavList.forEach(item => {
            let a = document.createElement('a');
            a.innerText = item.name;
            if (item.type === 'internal' || item.type === 'new') {
                let tid = item.targetId;
                let tname = '';
                if (topMenus[tid]) tname = topMenus[tid].name;
                else if (subMenus[tid]) tname = subMenus[tid].name;
                else if (extraPages[tid]) tname = extraPages[tid].name;
                else tname = item.newPageName || '页面';
                a.onclick = (e) => { e.preventDefault(); showPage(tname, tid); };
                a.href = 'javascript:void(0)';
            } else {
                a.href = item.url || '#';
                a.target = '_blank';
            }
            box.appendChild(a);
        });
    }

    function loadData(menuId) {
        if (!resourceLinks[menuId]) resourceLinks[menuId] = { 1: [] };
        if (!currentPage[menuId]) currentPage[menuId] = 1;
        let page = currentPage[menuId];
        let list = resourceLinks[menuId][page] || [];
        let box = document.getElementById('box_' + menuId);
        let pageBox = document.getElementById('pagebtn_' + menuId);
        if (!box || !pageBox) return;
        box.innerHTML = '';
        if (list.length === 0) {
            box.innerHTML = '<div class="empty-tip">📭 暂无链接</div>';
        } else {
            list.forEach(item => {
                box.innerHTML += `<div class="link-item"><a href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.name)}</a></div>`;
            });
        }
        let pages = Object.keys(resourceLinks[menuId]);
        pageBox.innerHTML = '';
        if (pages.length <= 1) return;
        pages.forEach(p => {
            pageBox.innerHTML += `<button class="page-btn ${p == page ? 'active' : ''}" onclick="switchPage('${menuId}',${p})">第${p}页</button>`;
        });
    }

    function switchPage(id, p) { currentPage[id] = p; loadData(id); }

    function showPage(title, id) {
        document.getElementById('title').innerText = '当前位置：' + escapeHtml(title);
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        ensurePageContainer(id, title);
        let target = document.getElementById(id);
        if (target) target.classList.add('active');
        if (id !== 'home') loadData(id);
        document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('show'));
    }

    function toggleMenu(ele) {
        let sub = ele.nextElementSibling;
        document.querySelectorAll('.sub-menu').forEach(s => { if (s !== sub) s.classList.remove('show'); });
        sub.classList.toggle('show');
    }

    // ------------------ 后台管理函数（实时更新）------------------
    function renderAllSelects() {
        let parentSel = document.getElementById('parentCateSelect');
        parentSel.innerHTML = '';
        for (let id in topMenus) parentSel.appendChild(new Option(topMenus[id].name, id));
        let delBranch = document.getElementById('delBranchSelect');
        delBranch.innerHTML = '';
        let branchList = [];
        for (let id in subMenus) {
            let parent = topMenus[subMenus[id].parentId];
            branchList.push({ id, name: (parent ? parent.name : '?') + ' → ' + subMenus[id].name });
        }
        if (branchList.length === 0) delBranch.innerHTML = '<option disabled>暂无分支</option>';
        else branchList.forEach(b => delBranch.appendChild(new Option(b.name, b.id)));
        let cate = document.getElementById('cate');
        let pageCate = document.getElementById('pageCate');
        let delPageCate = document.getElementById('delPageCate');
        cate.innerHTML = ''; pageCate.innerHTML = ''; delPageCate.innerHTML = '';
        let allMenus = [];
        for (let id in topMenus) allMenus.push({ id, name: '【顶级】' + topMenus[id].name });
        for (let id in subMenus) {
            let p = topMenus[subMenus[id].parentId];
            allMenus.push({ id, name: '【子级】' + (p ? p.name : '?') + ' → ' + subMenus[id].name });
        }
        for (let id in extraPages) allMenus.push({ id, name: '【独立页】' + extraPages[id].name });
        allMenus.forEach(m => {
            let opt = new Option(m.name, m.id);
            cate.appendChild(opt.cloneNode(true));
            pageCate.appendChild(opt.cloneNode(true));
            delPageCate.appendChild(opt.cloneNode(true));
        });
        let curCate = cate.value;
        let pageNum = document.getElementById('pageNum');
        pageNum.innerHTML = '';
        let pages = Object.keys(resourceLinks[curCate] || { 1: [] });
        pages.forEach(p => pageNum.appendChild(new Option(`第${p}页`, p)));
        let delCate = delPageCate.value;
        let delPageNum = document.getElementById('delPageNum');
        delPageNum.innerHTML = '';
        let dpages = Object.keys(resourceLinks[delCate] || { 1: [] });
        dpages.forEach(p => delPageNum.appendChild(new Option(`第${p}页`, p)));
    }

    function renderList() {
        let dom = document.getElementById('allLinks');
        dom.innerHTML = '';
        let all = [];
        for (let id in topMenus) all.push({ id, name: '【顶级】' + topMenus[id].name });
        for (let id in subMenus) {
            let p = topMenus[subMenus[id].parentId];
            all.push({ id, name: (p ? p.name : '?') + ' → ' + subMenus[id].name });
        }
        for (let id in extraPages) all.push({ id, name: '【独立页】' + extraPages[id].name });
        for (let m of all) {
            let links = resourceLinks[m.id];
            if (!links) continue;
            for (let page in links) {
                let arr = links[page];
                if (arr && arr.length) {
                    dom.innerHTML += `<h4 style="color:#fff;margin:15px 0 5px;">${escapeHtml(m.name)} - 第${page}页</h4>`;
                    arr.forEach((item, idx) => {
                        dom.innerHTML += `<div class="link-item"><a href="${escapeHtml(item.url)}" target="_blank">${escapeHtml(item.name)}</a><button class="del-btn" onclick="delLink('${m.id}',${page},${idx})">删除</button></div>`;
                    });
                }
            }
        }
    }

    function addTopCate() {
        if (!isLogin) return;
        let name = document.getElementById('newCate').value.trim();
        if (!name) return alert("请输入菜单名称");
        let id = 'top_' + Date.now();
        topMenus[id] = { name: name };
        resourceLinks[id] = { 1: [] };
        saveToLocal();
        rebuildNav();
        renderSubNav();
        renderAllSelects();
        renderList();
        document.getElementById('newCate').value = '';
        alert("顶级菜单添加成功");

    function deleteLastTopCate() {
        if (!isLogin) return;
        let ids = Object.keys(topMenus);
        if (ids.length === 0) return alert("没有顶级菜单可删除");
        let last = ids[ids.length - 1];
        delete topMenus[last];
        delete resourceLinks[last];
        for (let sid in subMenus) if (subMenus[sid].parentId === last) { delete subMenus[sid]; delete resourceLinks[sid]; }
        saveToLocal();
        rebuildNav();
        renderSubNav();
        renderAllSelects();
        renderList();
        let activeId = document.querySelector('.page.active')?.id;

    function addSubCate() {
        if (!isLogin) return;
        let pid = document.getElementById('parentCateSelect').value;
        let name = document.getElementById('subCateName').value.trim();
        if (!pid || !name) return alert("请选择顶级菜单并填写名称");
        let id = 'sub_' + Date.now();
        subMenus[id] = { parentId: pid, name: name };
        resourceLinks[id] = { 1: [] };
        saveToLocal();
        rebuildNav();
        renderSubNav();
        renderAllSelects();
        renderList();
        document.getElementById('subCateName').value = '';
        alert("分支添加成功");
    }
    function deleteBranch() {
        if (!isLogin) return;
        let sel = document.getElementById('delBranchSelect');
        if (!sel.value) return alert("请选择分支");
        let id = sel.value;
        if (!confirm("删除分支及所有链接？")) return;
        delete subMenus[id];
        delete resourceLinks[id];
        saveToLocal();
        rebuildNav();
        renderSubNav();
        renderAllSelects();
        renderList();
        let activeId = document.querySelector('.page.active')?.id;
        if (activeId === id) showPage('首页', 'home');
        alert("删除成功");
    }
    function addPage() {
        if (!isLogin) return;
        let mid = document.getElementById('pageCate').value;
        let pages = Object.keys(resourceLinks[mid] || {}).map(Number);
        let np = Math.max(...pages) + 1;
        resourceLinks[mid][np] = [];
        saveToLocal();
        renderAllSelects();
        renderList();
        if (document.querySelector('.page.active')?.id === mid) loadData(mid);
        alert(`添加第${np}页成功`);
    }
    function deletePage() {
        if (!isLogin) return;
        let mid = document.getElementById('delPageCate').value;
        let page = document.getElementById('delPageNum').value;
        let pages = Object.keys(resourceLinks[mid] || {});
        if (pages.length <= 1) return alert("至少保留一页");
        if (!confirm(`删除第${page}页的所有链接？`)) return;
        delete resourceLinks[mid][page];
        saveToLocal();
        renderAllSelects();
        renderList();
        if (document.querySelector('.page.active')?.id === mid) loadData(mid);
        alert("删除成功");
    }
    function addLink() {
        if (!isLogin) return;
        let mid = document.getElementById('cate').value;
        let page = document.getElementById('pageNum').value;
        let name = document.getElementById('linkName').value.trim();
        let url = document.getElementById('linkUrl').value.trim();
        if (!name || !url) return alert("填写完整");
        if (!resourceLinks[mid]) resourceLinks[mid] = {};
        if (!resourceLinks[mid][page]) resourceLinks[mid][page] = [];
        resourceLinks[mid][page].push({ name, url });
        saveToLocal();
        renderList();
        if (document.querySelector('.page.active')?.id === mid) loadData(mid);
        document.getElementById('linkName').value = '';
        document.getElementById('linkUrl').value = '';
        alert("链接添加成功");
    }
    function delLink(mid, page, idx) {
        if (!isLogin) return;
        resourceLinks[mid][page].splice(idx, 1);
        saveToLocal();
        renderList();
        if (document.querySelector('.page.active')?.id === mid) loadData(mid);
    }
    function addSubNavItem() {
        if (!isLogin) return;
        let name = document.getElementById('subNavName').value.trim();
        if (!name) return alert("请输入按钮名称");
        let type = document.getElementById('subNavType').value;
        let newItem = { name, type };
        if (type === 'internal') {
            let tid = document.getElementById('subNavInternalTarget').value;
            if (!tid) return alert("请选择内部菜单");
            newItem.targetId = tid;
        } else if (type === 'new') {
            let pname = document.getElementById('subNavNewPageName').value.trim();
            if (!pname) return alert("请输入页面名称");
            let nid = 'extra_' + Date.now();
            extraPages[nid] = { name: pname };
            resourceLinks[nid] = { 1: [] };
            newItem.targetId = nid;
            newItem.newPageName = pname;
        } else {
            let url = document.getElementById('subNavUrl').value.trim();
            newItem.url = url || '#';
        }
        subNavList.push(newItem);
        saveToLocal();
        renderSubNav();
        renderAllSelects();
        document.getElementById('subNavName').value = '';
        document.getElementById('subNavUrl').value = '';
        document.getElementById('subNavInternalTarget').value = '';
        document.getElementById('subNavNewPageName').value = '';
        alert("副导航按钮添加成功");
    }
    function showEditSubNavDialog() {
        let idx = document.getElementById('editSubNavSelect').value;
        if (!idx) return alert("请选择按钮");
        let item = subNavList[parseInt(idx)];
        let newName = prompt("修改名称", item.name);
        if (!newName) return;
        let newType = prompt("修改类型 (external/internal/new)", item.type);
        if (!["external", "internal", "new"].includes(newType)) return alert("类型错误");
        if (newType === 'internal') {
            let tid = prompt("内部菜单ID", item.targetId || "");
            if (!tid || (!topMenus[tid] && !subMenus[tid] && !extraPages[tid])) return alert("无效ID");
            item.targetId = tid;
            delete item.url;
            delete item.newPageName;
        } else if (newType === 'new') {
            let pname = prompt("独立页面名称", item.newPageName || "");
            if (!pname) return;
            if (item.type === 'new' && item.targetId && extraPages[item.targetId]) {
                extraPages[item.targetId].name = pname;
            } else {
                let nid = 'extra_' + Date.now();
                extraPages[nid] = { name: pname };
                resourceLinks[nid] = { 1: [] };
                item.targetId = nid;
            }
            item.newPageName = pname;
            delete item.url;
        } else {
            let url = prompt("外部链接", item.url || "#");
            item.url = url || "#";
            delete item.targetId;
            delete item.newPageName;
        }
        item.name = newName;
        item.type = newType;
        saveToLocal();
        renderSubNav();
        renderAllSelects();
        alert("修改成功");
    }
    function deleteSelectedSubNav() {
        if (!isLogin) return;
        let sel = document.getElementById('delSubNavSelect');
        if (!sel.value) return alert("请选择按钮");
        let idx = parseInt(sel.value);
        let item = subNavList[idx];
        if (!confirm(`删除“${item.name}”?`)) return;
        if (item.type === 'new' && item.targetId && extraPages[item.targetId]) {
            delete extraPages[item.targetId];
            delete resourceLinks[item.targetId];
        }
        subNavList.splice(idx, 1);
        saveToLocal();
        renderSubNav();
        renderAllSelects();
        alert("删除成功");
    }
    function deleteLastSubNavItem() {
        if (!isLogin) return;
        if (subNavList.length === 0) return alert("无副导航按钮");
        let last = subNavList[subNavList.length - 1];
        if (!confirm(`删除“${last.name}”?`)) return;
        if (last.type === 'new' && last.targetId && extraPages[last.targetId]) {
            delete extraPages[last.targetId];
            delete resourceLinks[last.targetId];
        }
        subNavList.pop();
        saveToLocal();
        renderSubNav();
        renderAllSelects();
        alert("删除成功");
    }

        document.getElementById('clock').innerText = `${h}:${m}:${s}`;
