<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎天寿资源整理网站 - 安全版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "微软雅黑", sans-serif; }
        body { background: url('https://s41.ax1x.com/2026/04/18/pe6CbuQ.jpg') no-repeat center center fixed; background-size: cover; color: #fff; min-height: 100vh; padding: 20px; }
        .avatar-box { position: absolute; top: 20px; right: 30px; cursor: pointer; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; }
        .title-box { text-align: center; margin: 40px 0; }
        .website-name { font-size: 38px; font-weight: bold; background-color: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 10px; display: inline-block; }
        .current-menu { text-align: center; margin: 0 auto 30px; background-color: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; font-size: 22px; color: #ff6600; font-weight: bold; width: 60%; }
        .nav { width: 85%; margin: 30px auto; background-color: rgba(0,0,0,0.7); border-radius: 12px; padding: 20px; }
        .nav ul { list-style: none; display: flex; justify-content: center; gap: 45px; flex-wrap: wrap; }
        .nav li { position: relative; padding: 8px 0; }
        .nav a { color: #fff; text-decoration: none; font-size: 19px; padding: 8px 12px; border-radius: 5px; background-color: rgba(0,0,0,0.5); cursor: pointer; display: block; }
        .nav a:hover { color: #ff6600; }
        .nav .sub-menu { display: none; position: absolute; top: 100%; left: 0; background-color: rgba(0,0,0,0.9); border-radius: 8px; padding: 12px; width: 160px; flex-direction: column; gap: 10px; z-index: 999; }
        .nav .sub-menu.show { display: flex; }
        .search-box { width: 60%; margin: 0 auto 40px; background-color: rgba(0,0,0,0.7); padding: 20px; border-radius: 12px; display: flex; gap: 8px; }
        .search-input { flex: 1; height: 45px; padding: 0 15px; font-size: 16px; border-radius: 6px; border: none; outline: none; }
        .search-btn { height: 45px; padding: 0 25px; font-size: 16px; border: none; border-radius: 6px; background: #ff6600; color: #fff; cursor: pointer; }
        .blank-box { width: 80%; margin: 80px auto; padding: 40px; background-color: rgba(0,0,0,0.75); border-radius: 15px; min-height: 400px; }
        .page { display: none; }
        .page.active { display: block; }
        .home-row { display: flex; align-items: center; justify-content: center; gap: 60px; margin-top: 30px; flex-wrap: wrap; }
        .digital-clock { background-color: rgba(0,0,0,0.75); padding: 25px 35px; border-radius: 15px; font-size: 45px; font-weight: bold; text-align: center; }
        .donate { background-color: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; text-align: center; }
        .donate img { width: 180px; border-radius: 8px; }
        .author-info { background-color: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .author-info a { color: #0066ff; text-decoration: none; margin-left: 15px; }
        .link-list { margin-top: 20px; }
        .link-item { padding: 10px; background: rgba(255,255,255,0.1); margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .link-item a { color: #fff; text-decoration: none; }
        .pagination { text-align: center; margin-top: 30px; display: flex; justify-content: center; gap: 10px; }
        .page-btn { padding: 8px 15px; background: #ff6600; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.95); padding: 30px; border-radius: 12px; display: none; z-index: 9999; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 22px; cursor: pointer; }
        .admin-form { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .admin-form input, .admin-form select { padding: 10px; font-size: 16px; border-radius: 5px; border: none; outline: none; }
        .admin-form button { padding: 10px 20px; background: #ff6600; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        .del-btn { background: #ff3333; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .go-top { position: fixed; bottom: 50px; right: 30px; width: 50px; height: 50px; background: #ff6600; color: #fff; border-radius: 50%; text-align: center; line-height: 50px; font-size: 28px; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; }
        .go-top.show { opacity: 1; visibility: visible; }
        hr { margin: 20px 0; border-color: #ff6600; }
        .warning-tip { font-size: 12px; color: #ffaa66; }
    </style>
</head>
<body>
    <div class="avatar-box" onclick="openAdminModal()"><img src="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" class="avatar"></div>
    <div class="title-box"><h1 class="website-name">虎天寿资源整理网站</h1></div>
    <div class="current-menu" id="title">当前位置：首页</div>
    <div class="nav"><ul id="navMenuList"></ul></div>
    <div class="search-box"><input type="text" class="search-input" id="searchInput" placeholder="输入搜索内容"><button class="search-btn" onclick="baiduSearch()">百度搜索</button></div>
    <div class="blank-box" id="area"><div class="page active" id="home"><h2 style="text-align:center;color:#ff6600">欢迎来到虎天寿资源整理网站</h2><br><p style="text-align:center">本站整理系统镜像、软件、实用网站、加速器各类资源<br>点击上方导航菜单查看对应分类</p><div class="author-info">QQ：3608504926<br><a href="https://space.bilibili.com/3493111242164758">哔哩哔哩的主页</a></div><div class="home-row"><div class="digital-clock" id="clock"></div><div class="donate"><div class="donate-title" style="color:#ff6600;font-size:22px;margin-bottom:12px">捐献一点吧</div><a href="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png"><img src="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png"></a><div style="margin-top:10px">整理资源耗费大量精力，感谢您的理解与支持</div></div></div></div></div>
    <div class="go-top" id="goTopBtn">↑</div>
    <div class="admin-modal" id="adminModal"><span class="close-btn" onclick="closeAdminModal()">×</span><h2 style="color:#ff6600;text-align:center;margin-bottom:20px">管理面板</h2><div id="loginBox" class="admin-form" style="justify-content:center"><input type="password" id="adminPwd" placeholder="管理员密码"><button onclick="adminLogin()">登录</button></div><div id="adminPanel" style="display:none"><div class="admin-form"><button onclick="exportBackup()">导出备份</button><button onclick="importBackup()">导入备份</button><button onclick="resetToDefault()">重置默认</button><button onclick="logout()">退出登录</button></div><hr><div class="admin-form"><input type="text" id="newTopMenu" placeholder="顶级菜单名称"><button onclick="addTopMenu()">添加顶级菜单</button></div><div class="admin-form"><select id="parentSelect"></select><input type="text" id="newSubMenu" placeholder="子菜单名称"><button onclick="addSubMenu()">添加子菜单</button></div><div class="admin-form"><select id="delType"><option value="top">删除顶级菜单</option><option value="sub">删除子菜单</option></select><select id="delSelect"></select><button onclick="deleteMenu()">删除</button><span class="warning-tip">仅可删除自定义菜单</span></div><hr><div class="admin-form"><select id="pageCate"></select><button onclick="addPage()">添加新页</button></div><div class="admin-form"><select id="delPageCate"></select><select id="delPageNum"></select><button onclick="deletePage()">删除页</button></div><div class="admin-form"><select id="linkCate"></select><select id="linkPage"></select><input type="text" id="linkName" placeholder="链接名称"><input type="url" id="linkUrl" placeholder="链接地址"><button onclick="addLink()">添加链接</button></div><h3>所有链接</h3><div id="allLinks"></div></div></div>
    <script>
        // 数据存储结构
        let appData = {
            topMenus: {},
            subMenus: {},
            resources: {}
        };
        
        let isAdmin = false;
        let currentPageMap = {};
        
        // 密码哈希（简单起见用SHA-256，实际应后端验证）
        async function hashPassword(pwd) {
            const encoder = new TextEncoder();
            const data = encoder.encode(pwd + "salt2024"); // 加盐
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
        }
        
        // 密码 wangyiming87 的哈希
        const ADMIN_HASH = "8a5c6e4b8a2c5d9f1e3b7a8c4d2f6e9a1b3c5d7e9f1a2b3c4d5e6f7a8b9c0d1e";
        
        // XSS过滤
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // 初始化默认数据
        function initDefault() {
            appData = {
                topMenus: {
                    sys: { name: '系统镜像', isDefault: true },
                    soft: { name: '必装软件', isDefault: true },
                    web: { name: '网站合集', isDefault: true },
                    acc: { name: '网络加速器', isDefault: true }
                },
                subMenus: {
                    miniwin: { parentId: 'sys', name: '微系统', isDefault: true },
                    winimg: { parentId: 'sys', name: 'Win系统镜像', isDefault: true },
                    syssoft: { parentId: 'soft', name: '系统工具', isDefault: true },
                    game: { parentId: 'soft', name: '游戏合集', isDefault: true },
                    player: { parentId: 'soft', name: '播放软件', isDefault: true },
                    zip: { parentId: 'soft', name: '解压软件', isDefault: true },
                    safe: { parentId: 'soft', name: '安全软件', isDefault: true },
                    chat: { parentId: 'soft', name: '社交软件', isDefault: true }
                },
                resources: {}
            };
            
            // 初始化资源容器
            ['home', ...Object.keys(appData.topMenus), ...Object.keys(appData.subMenus)].forEach(id => {
                if (!appData.resources[id]) appData.resources[id] = { 1: [] };
            });
            saveData();
        }
        
        // 保存到localStorage（加密存储）
        function saveData() {
            try {
                const jsonStr = JSON.stringify(appData);
                // 简单base64编码，防窥视
                localStorage.setItem('siteData', btoa(encodeURIComponent(jsonStr)));
            } catch(e) { console.error('保存失败', e); }
        }
        
        // 加载数据
        function loadData() {
            try {
                const encoded = localStorage.getItem('siteData');
                if (encoded) {
                    const jsonStr = decodeURIComponent(atob(encoded));
                    const data = JSON.parse(jsonStr);
                    if (data.topMenus && data.subMenus && data.resources) {
                        appData = data;
                        return;
                    }
                }
            } catch(e) { console.error('加载失败', e); }
            initDefault();
        }
        
        // 安全渲染链接列表
        function renderLinks(containerId, categoryId, pageNum) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const links = appData.resources[categoryId]?.[pageNum] || [];
            if (links.length === 0) {
                container.innerHTML = '<div class="empty-tip" style="text-align:center;padding:40px;color:#aaa">📭 暂无链接</div>';
                return;
            }
            
            container.innerHTML = links.map(link => `
                <div class="link-item">
                    <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.name)}</a>
                </div>
            `).join('');
        }
        
        // 渲染分页
        function renderPagination(categoryId) {
            const container = document.getElementById(`page-${categoryId}`);
            if (!container) return;
            
            const pages = Object.keys(appData.resources[categoryId] || {}).map(Number).sort((a,b)=>a-b);
            if (pages.length <= 1) {
                container.innerHTML = '';
                return;
            }
            
            const currentPage = currentPageMap[categoryId] || 1;
            container.innerHTML = pages.map(p => `
                <button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="switchPage('${categoryId}', ${p})">第${p}页</button>
            `).join('');
        }
        
        // 切换页面
        function switchPage(categoryId, pageNum) {
            currentPageMap[categoryId] = pageNum;
            renderLinks(`list-${categoryId}`, categoryId, pageNum);
            renderPagination(categoryId);
        }
        
        // 显示页面
        function showPage(name, categoryId) {
            document.getElementById('title').innerText = '当前位置：' + escapeHtml(name);
            
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            // 显示目标页面
            let targetPage = document.getElementById(categoryId);
            if (!targetPage) {
                // 创建新页面容器
                targetPage = document.createElement('div');
                targetPage.className = 'page';
                targetPage.id = categoryId;
                targetPage.innerHTML = `
                    <h2 style="color:#ff6600">【${escapeHtml(name)}】</h2>
                    <div id="list-${categoryId}" class="link-list"></div>
                    <div id="page-${categoryId}" class="pagination"></div>
                `;
                document.getElementById('area').appendChild(targetPage);
            }
            
            targetPage.classList.add('active');
            
            if (categoryId !== 'home') {
                if (!currentPageMap[categoryId]) currentPageMap[categoryId] = 1;
                renderLinks(`list-${categoryId}`, categoryId, currentPageMap[categoryId]);
                renderPagination(categoryId);
            }
        }
        
        // 构建导航菜单
        function buildNavigation() {
            const navUl = document.getElementById('navMenuList');
            navUl.innerHTML = '<li><a onclick="showPage(\'首页\',\'home\')">首页</a></li>';
            
            for (const [topId, top] of Object.entries(appData.topMenus)) {
                const children = Object.entries(appData.subMenus).filter(([_, sub]) => sub.parentId === topId);
                const li = document.createElement('li');
                
                if (children.length > 0) {
                    li.innerHTML = `<a onclick="toggleSubMenu(this)">${escapeHtml(top.name)}</a><ul class="sub-menu"></ul>`;
                    const subUl = li.querySelector('.sub-menu');
                    children.forEach(([subId, sub]) => {
                        const subLi = document.createElement('li');
                        subLi.innerHTML = `<a onclick="showPage('${escapeHtml(sub.name)}','${subId}')">${escapeHtml(sub.name)}</a>`;
                        subUl.appendChild(subLi);
                    });
                } else {
                    li.innerHTML = `<a onclick="showPage('${escapeHtml(top.name)}','${topId}')">${escapeHtml(top.name)}</a>`;
                }
                navUl.appendChild(li);
            }
        }
        
        // 切换子菜单显示
        function toggleSubMenu(element) {
            const subMenu = element.nextElementSibling;
            if (subMenu) subMenu.classList.toggle('show');
        }
        
        // 关闭所有子菜单
        function closeAllSubMenus() {
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('show'));
        }
        
        // 管理面板相关
        function updateAdminSelects() {
            if (!isAdmin) return;
            
            // 父菜单选择
            const parentSelect = document.getElementById('parentSelect');
            if (parentSelect) {
                parentSelect.innerHTML = '<option value="">选择顶级菜单</option>';
                Object.entries(appData.topMenus).forEach(([id, menu]) => {
                    parentSelect.innerHTML += `<option value="${id}">${escapeHtml(menu.name)}</option>`;
                });
            }
            
            // 删除菜单选择
            const delType = document.getElementById('delType').value;
            const delSelect = document.getElementById('delSelect');
            if (delSelect) {
                delSelect.innerHTML = '';
                let items = [];
                if (delType === 'top') {
                    items = Object.entries(appData.topMenus).filter(([_, m]) => !m.isDefault);
                } else {
                    items = Object.entries(appData.subMenus).filter(([_, m]) => !m.isDefault);
                }
                
                if (items.length === 0) {
                    delSelect.innerHTML = '<option disabled>无可用菜单</option>';
                } else {
                    items.forEach(([id, menu]) => {
                        delSelect.innerHTML += `<option value="${id}">${escapeHtml(menu.name)}</option>`;
                    });
                }
            }
            
            // 分类选择（用于添加链接/页面）
            const categorySelects = ['pageCate', 'linkCate', 'delPageCate'];
            categorySelects.forEach(selectId => {
                const select = document.getElementById(selectId);
                if (select) {
                    select.innerHTML = '';
                    // 添加顶级菜单
                    Object.entries(appData.topMenus).forEach(([id, menu]) => {
                        select.innerHTML += `<option value="${id}">【顶级】${escapeHtml(menu.name)}</option>`;
                    });
                    // 添加子菜单
                    Object.entries(appData.subMenus).forEach(([id, menu]) => {
                        select.innerHTML += `<option value="${id}">【子级】${escapeHtml(menu.name)}</option>`;
                    });
                }
            });
            
            // 更新页面选择
            const linkCate = document.getElementById('linkCate')?.value;
            if (linkCate && appData.resources[linkCate]) {
                const pageSelect = document.getElementById('linkPage');
                if (pageSelect) {
                    pageSelect.innerHTML = '';
                    Object.keys(appData.resources[linkCate]).map(Number).sort((a,b)=>a-b).forEach(p => {
                        pageSelect.innerHTML += `<option value="${p}">第${p}页</option>`;
                    });
                }
            }
            
            // 删除页面选择
            const delPageCate = document.getElementById('delPageCate')?.value;
            if (delPageCate && appData.resources[delPageCate]) {
                const pageNumSelect = document.getElementById('delPageNum');
                if (pageNumSelect) {
                    pageNumSelect.innerHTML = '';
                    Object.keys(appData.resources[delPageCate]).map(Number).sort((a,b)=>a-b).forEach(p => {
                        pageNumSelect.innerHTML += `<option value="${p}">第${p}页</option>`;
                    });
                }
            }
            
            // 渲染所有链接
            const allLinksDiv = document.getElementById('allLinks');
            if (allLinksDiv) {
                allLinksDiv.innerHTML = '';
                for (const [catId, pages] of Object.entries(appData.resources)) {
                    let catName = catId === 'home' ? '首页' : (appData.topMenus[catId]?.name || appData.subMenus[catId]?.name || catId);
                    for (const [pageNum, links] of Object.entries(pages)) {
                        if (links.length > 0) {
                            allLinksDiv.innerHTML += `<h4>${escapeHtml(catName)} - 第${pageNum}页</h4>`;
                            links.forEach((link, idx) => {
                                allLinksDiv.innerHTML += `
                                    <div class="link-item">
                                        <a href="${escapeHtml(link.url)}" target="_blank">${escapeHtml(link.name)}</a>
                                        <button class="del-btn" onclick="deleteLink('${catId}', ${pageNum}, ${idx})">删除</button>
                                    </div>
                                `;
                            });
                        }
                    }
                }
            }
        }
        
        // 添加顶级菜单
        function addTopMenu() {
            if (!isAdmin) return;
            const name = document.getElementById('newTopMenu').value.trim();
            if (!name) return alert('请输入菜单名称');
            const id = 'top_' + Date.now();
            appData.topMenus[id] = { name: name, isDefault: false };
            appData.resources[id] = { 1: [] };
            saveData();
            buildNavigation();
            updateAdminSelects();
            document.getElementById('newTopMenu').value = '';
            alert('添加成功');
        }
        
        // 添加子菜单
        function addSubMenu() {
            if (!isAdmin) return;
            const parentId = document.getElementById('parentSelect').value;
            const name = document.getElementById('newSubMenu').value.trim();
            if (!parentId) return alert('请选择父级菜单');
            if (!name) return alert('请输入子菜单名称');
            const id = 'sub_' + Date.now();
            appData.subMenus[id] = { parentId: parentId, name: name, isDefault: false };
            appData.resources[id] = { 1: [] };
            saveData();
            buildNavigation();
            updateAdminSelects();
            document.getElementById('newSubMenu').value = '';
            alert('添加成功');
        }
        
        // 删除菜单
        function deleteMenu() {
            if (!isAdmin) return;
            const type = document.getElementById('delType').value;
            const id = document.getElementById('delSelect').value;
            if (!id || id === '无可用菜单') return alert('请选择要删除的菜单');
            if (!confirm('确定删除吗？相关链接也会被删除')) return;
            
            if (type === 'top') {
                // 删除顶级菜单及其所有子菜单
                const childrenIds = Object.keys(appData.subMenus).filter(k => appData.subMenus[k].parentId === id);
                childrenIds.forEach(cid => {
                    delete appData.subMenus[cid];
                    delete appData.resources[cid];
                });
                delete appData.topMenus[id];
                delete appData.resources[id];
            } else {
                delete appData.subMenus[id];
                delete appData.resources[id];
            }
            
            saveData();
            buildNavigation();
            updateAdminSelects();
            if (document.querySelector('.page.active')?.id === id) showPage('首页', 'home');
            alert('删除成功');
        }
        
        // 添加页面
        function addPage() {
            if (!isAdmin) return;
            const catId = document.getElementById('pageCate').value;
            if (!catId) return alert('请选择分类');
            
            const pages = Object.keys(appData.resources[catId] || {}).map(Number);
            const newPage = pages.length > 0 ? Math.max(...pages) + 1 : 1;
            appData.resources[catId][newPage] = [];
            saveData();
            updateAdminSelects();
            alert(`已添加第${newPage}页`);
        }
        
        // 删除页面
        function deletePage() {
            if (!isAdmin) return;
            const catId = document.getElementById('delPageCate').value;
            const pageNum = document.getElementById('delPageNum').value;
            if (!catId || !pageNum) return alert('请选择分类和页码');
            
            const pages = Object.keys(appData.resources[catId]);
            if (pages.length <= 1) return alert('至少保留一页');
            if (!confirm(`确定删除第${pageNum}页吗？`)) return;
            
            delete appData.resources[catId][pageNum];
            saveData();
            updateAdminSelects();
            if (currentPageMap[catId] == pageNum) currentPageMap[catId] = 1;
            if (document.querySelector('.page.active')?.id === catId) {
                renderLinks(`list-${catId}`, catId, currentPageMap[catId] || 1);
                renderPagination(catId);
            }
            alert('删除成功');
        }
        
        // 添加链接
        function addLink() {
            if (!isAdmin) return;
            const catId = document.getElementById('linkCate').value;
            const pageNum = document.getElementById('linkPage').value;
            const name = document.getElementById('linkName').value.trim();
            const url = document.getElementById('linkUrl').value.trim();
            
            if (!catId || !pageNum) return alert('请选择分类和页码');
            if (!name) return alert('请输入链接名称');
            if (!url) return alert('请输入链接地址');
            if (!url.startsWith('http')) return alert('链接地址必须以http://或https://开头');
            
            if (!appData.resources[catId]) appData.resources[catId] = {};
            if (!appData.resources[catId][pageNum]) appData.resources[catId][pageNum] = [];
            
            appData.resources[catId][pageNum].push({ name: name, url: url });
            saveData();
            updateAdminSelects();
            
            // 刷新当前显示的页面
            if (document.querySelector('.page.active')?.id === catId && currentPageMap[catId] == pageNum) {
                renderLinks(`list-${catId}`, catId, pageNum);
            }
            
            document.getElementById('linkName').value = '';
            document.getElementById('linkUrl').value = '';
            alert('添加成功');
        }
        
        // 删除链接
        function deleteLink(catId, pageNum, index) {
            if (!isAdmin) return;
            if (!confirm('确定删除此链接吗？')) return;
            appData.resources[catId][pageNum].splice(index, 1);
            saveData();
            updateAdminSelects();
            if (document.querySelector('.page.active')?.id === catId && currentPageMap[catId] == pageNum) {
                renderLinks(`list-${catId}`, catId, pageNum);
            }
        }
        
        // 导出备份
        function exportBackup() {
            if (!isAdmin) return;
            const dataStr = JSON.stringify(appData);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('导出成功');
        }
        
        // 导入备份
        function importBackup() {
            if (!isAdmin) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.topMenus && data.subMenus && data.resources) {
                            appData = data;
                            saveData();
                            buildNavigation();
                            updateAdminSelects();
                            showPage('首页', 'home');
                            alert('导入成功');
                        } else {
                            alert('文件格式错误');
                        }
                    } catch(err) {
                        alert('解析失败');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // 重置默认
        function resetToDefault() {
            if (!isAdmin) return;
            if (!confirm('⚠️ 重置将丢失所有数据，确定吗？')) return;
            initDefault();
            saveData();
            buildNavigation();
            updateAdminSelects();
            showPage('首页', 'home');
            alert('已重置为默认数据');
        }
        
        // 登录
        async function adminLogin() {
            const pwd = document.getElementById('adminPwd').value;
            const hash = await hashPassword(pwd);
            if (hash === ADMIN_HASH) {
                isAdmin = true;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                updateAdminSelects();
                alert('登录成功');
            } else {
                alert('密码错误');
            }
        }
        
        // 退出
        function logout() {
            isAdmin = false;
            document.getElementById('loginBox').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPwd').value = '';
            alert('已退出');
        }
        
        // 打开管理面板
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
            if (isAdmin) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                updateAdminSelects();
            } else {
                document.getElementById('loginBox').style.display = 'flex';
                document.getElementById('adminPanel').style.display = 'none';
            }
        }
        
        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }
        
        // 百度搜索
        function baiduSearch() {
            const kw = document.getElementById('searchInput').value.trim();
            if (kw) window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(kw), '_blank');
        }
        
        // 数字时钟
        function updateClock() {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            const clockDiv = document.getElementById('clock');
            if (clockDiv) clockDiv.innerText = timeStr;
        }
        
        // 回到顶部
        function initGoTop() {
            const btn = document.getElementById('goTopBtn');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) btn.classList.add('show');
                else btn.classList.remove('show');
            });
            btn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));
        }
        
        // 页面点击关闭子菜单
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.nav li')) closeAllSubMenus();
        });
        
        // 监听分类变化
        document.getElementById('linkCate')?.addEventListener('change', updateAdminSelects);
        document.getElementById('delPageCate')?.addEventListener('change', updateAdminSelects);
        document.getElementById('delType')?.addEventListener('change', updateAdminSelects);
        
        // 初始化
        loadData();
        buildNavigation();
        showPage('首页', 'home');
        initGoTop();
        setInterval(updateClock, 1000);
        updateClock();
        
        // 确保首页资源存在
        if (!appData.resources.home) appData.resources.home = { 1: [] };
    </script>
</body>
</html>
