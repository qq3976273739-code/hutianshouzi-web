<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" type="image/png">
    <title>虎天寿资源整理网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: url('https://s41.ax1x.com/2026/04/18/pe6CbuQ.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .avatar-box {
            position: absolute;
            top: 20px;
            right: 30px;
            cursor: pointer;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            transition: 0.2s;
        }
        .avatar:hover {
            box-shadow: 0 0 15px #ff6600;
        }
        .title-box {
            text-align: center;
            margin: 40px 0;
        }
        .website-name {
            font-size: 38px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 30px;
            border-radius: 10px;
            display: inline-block;
        }
        .current-menu {
            text-align: center;
            margin: 0 auto 30px;
            background-color: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 22px;
            color: #ff6600;
            font-weight: bold;
            width: 60%;
        }
        .nav {
            width: 85%;
            margin: 30px auto;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }
        .nav-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #ff6600;
            object-fit: cover;
        }
        .nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 45px;
        }
        .nav li {
            position: relative;
            padding: 8px 0;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            font-size: 19px;
            padding: 8px 12px;
            border-radius: 5px;
            background-color: rgba(0,0,0,0.5);
            cursor: pointer;
            display: block;
        }
        .nav a:hover {
            color: #ff6600;
            background-color: rgba(0,0,0,0.8);
        }
        .nav .sub-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: rgba(0,0,0,0.9);
            border-radius: 8px;
            padding: 12px;
            width: 160px;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .nav .sub-menu.show {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }
        .sub-menu li {
            position: relative;
        }
        .sub-menu .sub-child {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            background-color: rgba(0,0,0,0.9);
            border-radius: 8px;
            padding: 12px;
            width: 130px;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.3s ease;
        }
        .sub-menu .sub-child.show {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }
        .search-box {
            width: 60%;
            margin: 0 auto 40px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .baidu-icon {
            width: 28px;
            height: 28px;
            border-radius: 4px;
        }
        .search-input {
            width: 70%;
            height: 45px;
            padding: 0 15px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 6px 0 0 6px;
            outline: none;
            background: rgba(255,255,255,0.9);
        }
        .search-btn {
            height: 45px;
            padding: 0 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 0 6px 6px 0;
            background: #ff6600;
            color: #fff;
            cursor: pointer;
        }
        .search-btn:hover {
            background: #e65c00;
        }
        .blank-box {
            width: 80%;
            margin: 80px auto;
            padding: 40px;
            background-color: rgba(0,0,0,0.75);
            border-radius: 15px;
            min-height: 400px;
            scroll-margin-top: 30px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .home-top-btn {
            text-align: center;
            margin-bottom: 30px;
        }
        .home-top-btn button {
            padding: 10px 25px;
            font-size: 18px;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .home-top-btn button:hover {
            background: #e65c00;
        }
        .home-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .digital-clock {
            background-color: rgba(0,0,0,0.75);
            padding: 25px 35px;
            border-radius: 15px;
            font-size: 45px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 5px;
            text-align: center;
        }
        .donate-group {
            text-align: center;
        }
        .donate {
            background-color: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
        }
        .donate-title {
            font-size: 22px;
            color: #ff6600;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .donate img {
            width: 180px;
            border-radius: 8px;
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            color: #fff;
        }
        .author-info {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }
        .author-info a {
            color: #0066ff;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }
        .author-info a:hover {
            color: #ff6600;
        }
        .pagination {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 15px;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .page-btn.active {
            background: #e65c00;
            font-weight: bold;
        }
        .page-btn:hover {
            background: #e65c00;
        }
        .admin-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 12px;
            display: none;
            z-index: 9999;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .admin-title { color: #ff6600; font-size: 28px; margin-bottom: 20px; text-align: center; }
        .login-box { text-align: center; margin: 20px 0; }
        .login-box input {
            padding: 12px;
            font-size: 18px;
            width: 300px;
            border: none;
            border-radius: 6px;
            outline: none;
        }
        .login-box button {
            padding: 12px 30px;
            margin-left: 10px;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .admin-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .admin-form select,
        .admin-form input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        .admin-form button {
            padding: 10px 20px;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .del-page-btn {
            background: #ff3333;
        }
        .del-page-btn:hover {
            background: #cc0000;
        }
        .del-menu-btn {
            background: #aa2e2e;
        }
        .del-menu-btn:hover {
            background: #7a1f1f;
        }
        .link-list { margin-top: 20px; }
        .link-item {
            padding: 10px;
            background: rgba(255,255,255,0.1);
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .link-item a { color: #fff; text-decoration: none; }
        .link-item a:hover { color: #ff6600; }
        .del-btn {
            background: #ff3333;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
        }
        .warning-tip {
            font-size: 12px;
            color: #ffaa66;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="avatar-box" onclick="openAdminModal()">
        <img src="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" alt="头像" class="avatar">
    </div>

    <div class="title-box">
        <h1 class="website-name">虎天寿资源整理网站</h1>
    </div>
    <div class="current-menu" id="title">当前位置：首页</div>

    <!-- 导航栏容器 -->
    <div class="nav" id="navContainer">
        <img src="https://s41.ax1x.com/2026/04/18/pe6CRHA.jpg" alt="个人头像" class="nav-avatar">
        <ul id="navMenuList">
            <!-- 动态生成导航菜单 -->
        </ul>
    </div>

    <div class="search-box">
        <img src="https://www.baidu.com/favicon.ico" class="baidu-icon" alt="百度">
        <input type="text" class="search-input" id="baiduSearchInput" placeholder="输入搜索内容">
        <button class="search-btn" onclick="baiduSearch()">百度搜索</button>
    </div>

    <div class="blank-box" id="area">
        <!-- 首页固定 -->
        <div class="page active" id="home">
            <div class="home-top-btn">
                <button onclick="showPage('首页','home')">🏠 返回主页</button>
            </div>
            <h2 style="text-align:center;color:#ff6600">欢迎来到虎天寿资源整理网站</h2>
            <br>
            <p style="font-size:18px;text-align:center">本站整理系统镜像、软件、实用网站、加速器各类资源<br>点击上方导航菜单查看对应分类</p>
            <div class="author-info">
                QQ：3608504926<br>
                <a href="https://space.bilibili.com/3493111242164758">哔哩哔哩的主页</a>
            </div>
            <div class="home-row">
                <div class="digital-clock" id="clock"></div>
                <div class="donate-group">
                    <div class="donate">
                        <div class="donate-title">捐献一点吧</div>
                        <a href="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png">
                            <img src="https://i.cetsteam.com/imgs/2026/04/01/6206ae66c0bf00a8.png">
                        </a>
                    </div>
                    <div class="footer-text">整理资源耗费大量精力，维护网站也需要持续付出，感谢您的理解与支持</div>
                </div>
            </div>
        </div>

        <!-- 默认分类页面容器（动态生成的也会追加在此） -->
    </div>

    <!-- 后台管理弹窗 -->
    <div class="admin-modal" id="adminModal">
        <span class="close-btn" onclick="closeAdminModal()">×</span>
        <div class="admin-box">
            <h2 class="admin-title">下载链接管理面板</h2>
            <div class="login-box" id="loginBox">
                <input type="password" id="pwd" placeholder="请输入管理员密码">
                <button onclick="adminLogin()">登录</button>
            </div>
            <div id="adminPanel" style="display:none;">
                <div class="admin-form">
                    <input type="text" id="newCate" placeholder="自定义菜单名称(如:软件合集)">
                    <button onclick="addCate()">添加自定义菜单</button>
                </div>
                <div class="admin-form">
                    <select id="delCateSelect"></select>
                    <button class="del-menu-btn" onclick="deleteCustomMenu()">🗑️ 删除选中菜单</button>
                    <span class="warning-tip">⚠️ 仅可删除自定义添加的菜单</span>
                </div>
                <div class="admin-form">
                    <select id="pageCate"></select>
                    <button onclick="addPage()">添加新页数（+1页）</button>
                </div>
                <div class="admin-form">
                    <select id="delPageCate"></select>
                    <select id="delPageNum"></select>
                    <button class="del-page-btn" onclick="deletePage()">删除选中页数</button>
                </div>
                <div class="admin-form">
                    <select id="cate"></select>
                    <select id="pageNum"></select>
                    <input type="text" id="linkName" placeholder="链接名称">
                    <input type="url" id="linkUrl" placeholder="下载链接地址">
                    <button onclick="addLink()">添加链接</button>
                </div>
                <h3 style="color:#ff6600;margin:10px 0;">已添加全部链接</h3>
                <div id="allLinks"></div>
            </div>
        </div>
    </div>

    <script>
        // 管理员密码
        const ADMIN_PASSWORD = "wangyiming87";
        let isLogin = false;
        let currentPage = {};

        // 默认分类 (不可删除)
        const DEFAULT_CATES = {
            miniwin: '微系统',
            winimg: 'Win系统镜像',
            syssoft: '系统工具',
            game: '游戏合集',
            player: '播放软件',
            zip: '解压软件',
            safe: '安全软件',
            chat: '社交软件',
            web: '优质网站',
            acc: '网络加速器'
        };

        function digitalClock() {
            let now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }
        setInterval(digitalClock, 1000);
        digitalClock();

        function getStorage(key) {
            return JSON.parse(localStorage.getItem(key) || '{}');
        }
        function setStorage(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // 初始化默认数据
        function initData() {
            let data = getStorage('resourceLinks');
            for (let cate in DEFAULT_CATES) {
                if (!data[cate]) data[cate] = { 1: [] };
            }
            setStorage('resourceLinks', data);
            if (!getStorage('customCates')) setStorage('customCates', {});
        }
        initData();

        // 获取所有分类（默认+自定义）
        function getAllCates() {
            let custom = getStorage('customCates');
            return { ...DEFAULT_CATES, ...custom };
        }

        // 动态创建页面容器（如果不存在）
        function ensurePageContainer(cateId, cateName) {
            let container = document.getElementById(cateId);
            if (!container) {
                let area = document.getElementById('area');
                let newDiv = document.createElement('div');
                newDiv.className = 'page';
                newDiv.id = cateId;
                newDiv.innerHTML = `<h2 style="color:#ff6600">【${cateName}】</h2><div id="list-${cateId}" class="link-list"></div><div id="page-${cateId}" class="pagination"></div>`;
                area.appendChild(newDiv);
            } else {
                // 更新标题（名称可能变了）
                let titleH2 = container.querySelector('h2');
                if (titleH2) titleH2.innerHTML = `【${cateName}】`;
            }
        }

        // 删除页面容器
        function removePageContainer(cateId) {
            let container = document.getElementById(cateId);
            if (container) container.remove();
        }

        // 重建整个导航菜单（基于当前所有分类）
        function rebuildNavMenu() {
            const allCates = getAllCates();
            const navUl = document.getElementById('navMenuList');
            if (!navUl) return;
            // 清空现有菜单（保留首页）
            navUl.innerHTML = '';
            // 首页
            let homeLi = document.createElement('li');
            homeLi.innerHTML = '<a onclick="showPage(\'首页\',\'home\')">首页</a>';
            navUl.appendChild(homeLi);
            // 系统镜像固定分组
            let sysImgLi = document.createElement('li');
            sysImgLi.innerHTML = `<a onclick="toggleMenu(this)">系统镜像</a>
                <ul class="sub-menu">
                    <li><a onclick="showPage('系统镜像 - 微系统','miniwin')">微系统</a></li>
                    <li><a onclick="showPage('系统镜像 - Win系统镜像','winimg')">Win系统镜像</a></li>
                </ul>`;
            navUl.appendChild(sysImgLi);
            // 必装软件分组
            let softLi = document.createElement('li');
            softLi.innerHTML = `<a onclick="toggleMenu(this)">必装软件</a>
                <ul class="sub-menu">
                    <li><a onclick="showPage('必装软件 - 系统工具','syssoft')">系统</a></li>
                    <li><a onclick="showPage('必装软件 - 游戏合集','game')">游戏</a></li>
                    <li>
                        <a onclick="toggleMenu(this)">日常</a>
                        <ul class="sub-child">
                            <li><a onclick="showPage('日常 - 播放软件','player')">播放</a></li>
                            <li><a onclick="showPage('日常 - 解压缩软件','zip')">解压缩</a></li>
                            <li><a onclick="showPage('日常 - 安全防护','safe')">安全</a></li>
                            <li><a onclick="showPage('日常 - 社交软件','chat')">社交</a></li>
                        </ul>
                    </li>
                </ul>`;
            navUl.appendChild(softLi);
            // 网站和加速器
            let webLi = document.createElement('li');
            webLi.innerHTML = '<a onclick="showPage(\'网站合集\',\'web\')">网站</a>';
            navUl.appendChild(webLi);
            let accLi = document.createElement('li');
            accLi.innerHTML = '<a onclick="showPage(\'网络加速器\',\'acc\')">加速器</a>';
            navUl.appendChild(accLi);
            // 动态添加自定义菜单（直接作为一级菜单）
            for (let [id, name] of Object.entries(allCates)) {
                if (DEFAULT_CATES[id]) continue; // 默认已处理，跳过
                let customLi = document.createElement('li');
                customLi.innerHTML = `<a onclick="showPage('${name}','${id}')">${name}</a>`;
                navUl.appendChild(customLi);
                // 确保页面容器存在
                ensurePageContainer(id, name);
            }
            // 确保所有默认分类的页面容器存在
            for (let [id, name] of Object.entries(DEFAULT_CATES)) {
                ensurePageContainer(id, name);
            }
        }

        // 加载分类链接和分页
        function loadLinks(cate, page) {
            let data = getStorage('resourceLinks');
            let list = data[cate]?.[page] || [];
            let dom = document.getElementById(`list-${cate}`);
            if (!dom) return;
            dom.innerHTML = '';
            list.forEach(item => {
                dom.innerHTML += `<div class="link-item"><a href="${item.url}" target="_blank">${item.name}</a></div>`;
            });
        }

        function renderPagination(cate) {
            let data = getStorage('resourceLinks');
            let pageDom = document.getElementById(`page-${cate}`);
            if (!pageDom) return;
            pageDom.innerHTML = '';
            let pages = Object.keys(data[cate] || {});
            if (pages.length <= 1) return;
            pages.forEach(page => {
                pageDom.innerHTML += `<button class="page-btn ${page == currentPage[cate] ? 'active' : ''}" onclick="switchPage('${cate}',${page})">第${page}页</button>`;
            });
        }

        function switchPage(cate, page) {
            currentPage[cate] = page;
            loadLinks(cate, page);
            renderPagination(cate);
        }

        function showPage(name, id) {
            document.getElementById('title').innerText = '当前位置：' + name;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            let targetPage = document.getElementById(id);
            if (targetPage) {
                targetPage.classList.add('active');
                if (id !== 'home') {
                    if (!currentPage[id]) currentPage[id] = 1;
                    loadLinks(id, currentPage[id]);
                    renderPagination(id);
                }
            } else {
                // 如果页面不存在（极少情况），回首页
                document.getElementById('home').classList.add('active');
            }
            document.querySelectorAll('.sub-menu, .sub-child').forEach(item => item.classList.remove('show'));
            document.getElementById('area').scrollIntoView({ behavior: 'smooth' });
        }

        // 后台相关函数
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('pwd').value = '';
            renderAllSelects();
        }
        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        function adminLogin() {
            const inputPwd = document.getElementById('pwd').value;
            if (inputPwd === ADMIN_PASSWORD) {
                isLogin = true;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                renderAdminList();
                renderAllSelects();
                alert("登录成功！");
            } else {
                alert("密码错误，无权访问！");
            }
        }

        function renderAllSelects() {
            renderCateSelect();
            renderPageSelect();
            renderDelPageSelect();
            renderDelCateSelect();
        }

        function renderCateSelect() {
            let select = document.getElementById('cate');
            let pageSelect = document.getElementById('pageCate');
            let delPageCate = document.getElementById('delPageCate');
            select.innerHTML = '';
            pageSelect.innerHTML = '';
            delPageCate.innerHTML = '';
            let allCates = getAllCates();
            for (let id in allCates) {
                let opt = document.createElement('option');
                opt.value = id;
                opt.innerText = allCates[id];
                select.appendChild(opt);
                pageSelect.appendChild(opt.cloneNode(true));
                delPageCate.appendChild(opt.cloneNode(true));
            }
        }

        function renderDelCateSelect() {
            let select = document.getElementById('delCateSelect');
            select.innerHTML = '';
            let custom = getStorage('customCates');
            if (Object.keys(custom).length === 0) {
                let opt = document.createElement('option');
                opt.text = '暂无自定义菜单';
                opt.disabled = true;
                select.appendChild(opt);
                return;
            }
            for (let id in custom) {
                let opt = document.createElement('option');
                opt.value = id;
                opt.innerText = custom[id];
                select.appendChild(opt);
            }
        }

        function renderPageSelect() {
            let pageSelect = document.getElementById('pageNum');
            let cate = document.getElementById('cate').value;
            let data = getStorage('resourceLinks');
            let pages = Object.keys(data[cate] || {});
            pageSelect.innerHTML = '';
            pages.forEach(page => {
                let opt = document.createElement('option');
                opt.value = page;
                opt.innerText = `第${page}页`;
                pageSelect.appendChild(opt);
            });
        }

        function renderDelPageSelect() {
            let delPageNum = document.getElementById('delPageNum');
            let cate = document.getElementById('delPageCate').value;
            let data = getStorage('resourceLinks');
            let pages = Object.keys(data[cate] || {});
            delPageNum.innerHTML = '';
            pages.forEach(page => {
                let opt = document.createElement('option');
                opt.value = page;
                opt.innerText = `第${page}页`;
                delPageNum.appendChild(opt);
            });
        }

        // 添加自定义菜单
        function addCate() {
            if (!isLogin) return;
            let name = document.getElementById('newCate').value.trim();
            if (!name) return alert("请输入菜单名称！");
            let cates = getStorage('customCates');
            let data = getStorage('resourceLinks');
            let id = 'cate_' + Date.now();
            cates[id] = name;
            data[id] = { 1: [] };
            setStorage('customCates', cates);
            setStorage('resourceLinks', data);
            document.getElementById('newCate').value = '';
            // 动态更新界面
            rebuildNavMenu();          // 重建导航
            ensurePageContainer(id, name); // 确保页面容器
            renderAllSelects();
            renderAdminList();
            alert(`自定义菜单“${name}”已添加，可在导航栏查看。`);
        }

        // 删除自定义菜单
        function deleteCustomMenu() {
            if (!isLogin) return alert("请先登录！");
            let select = document.getElementById('delCateSelect');
            if (!select.options.length || select.options[0].disabled) {
                alert("没有可删除的自定义菜单");
                return;
            }
            let cateId = select.value;
            let cateName = select.options[select.selectedIndex].text;
            let confirmDel = confirm(`⚠️ 确认删除整个菜单【${cateName}】吗？该菜单下的所有页和链接都会被永久删除！`);
            if (!confirmDel) return;

            let resourceData = getStorage('resourceLinks');
            delete resourceData[cateId];
            setStorage('resourceLinks', resourceData);
            let customCates = getStorage('customCates');
            delete customCates[cateId];
            setStorage('customCates', customCates);

            // 如果当前正在显示被删除的页面，跳回首页
            let activePage = document.querySelector('.page.active');
            if (activePage && activePage.id === cateId) {
                showPage('首页', 'home');
            }
            // 移除页面容器
            removePageContainer(cateId);
            // 重建导航
            rebuildNavMenu();
            renderAllSelects();
            renderAdminList();
            alert(`菜单“${cateName}”已删除。`);
        }

        function addPage() {
            if (!isLogin) return;
            let cate = document.getElementById('pageCate').value;
            let data = getStorage('resourceLinks');
            let currentPages = Object.keys(data[cate] || {}).map(Number);
            let newPage = Math.max(...currentPages) + 1;
            data[cate][newPage] = [];
            setStorage('resourceLinks', data);
            renderAllSelects();
            renderAdminList();
            // 如果当前正在查看该分类，刷新分页
            let activeId = document.querySelector('.page.active')?.id;
            if (activeId === cate) {
                renderPagination(cate);
            }
            alert(`成功添加【第${newPage}页】！`);
        }

        function deletePage() {
            if (!isLogin) return alert("请先登录！");
            let cate = document.getElementById('delPageCate').value;
            let page = document.getElementById('delPageNum').value;
            let data = getStorage('resourceLinks');
            let totalPages = Object.keys(data[cate] || {}).length;
            if (totalPages <= 1) {
                alert("⚠️ 无法删除最后1页！每个分类至少保留1页");
                return;
            }
            let confirmDel = confirm(`⚠️ 确认删除第${page}页吗？该页所有链接也会被删除！`);
            if (!confirmDel) return;
            delete data[cate][page];
            setStorage('resourceLinks', data);
            renderAllSelects();
            renderAdminList();
            if (currentPage[cate] && currentPage[cate] == page) {
                currentPage[cate] = 1;
                loadLinks(cate, 1);
            }
            renderPagination(cate);
            alert(`✅ 成功删除【第${page}页】！`);
        }

        function addLink() {
            if (!isLogin) return alert("请先登录！");
            let cate = document.getElementById('cate').value;
            let page = document.getElementById('pageNum').value;
            let name = document.getElementById('linkName').value.trim();
            let url = document.getElementById('linkUrl').value.trim();
            if (!name || !url) return alert('请填写完整信息！');
            let data = getStorage('resourceLinks');
            data[cate][page].push({ name, url });
            setStorage('resourceLinks', data);
            document.getElementById('linkName').value = '';
            document.getElementById('linkUrl').value = '';
            renderAdminList();
            if (document.querySelector('.page.active')?.id === cate) {
                loadLinks(cate, page);
                renderPagination(cate);
            }
        }

        function delLink(cate, page, index) {
            if (!isLogin) return;
            let data = getStorage('resourceLinks');
            data[cate][page].splice(index, 1);
            setStorage('resourceLinks', data);
            renderAdminList();
            if (document.querySelector('.page.active')?.id === cate) {
                loadLinks(cate, page);
            }
        }

        function renderAdminList() {
            let data = getStorage('resourceLinks');
            let allCates = getAllCates();
            let dom = document.getElementById('allLinks');
            dom.innerHTML = '';
            for (let cate in data) {
                let cateName = allCates[cate] || cate;
                for (let page in data[cate]) {
                    let list = data[cate][page];
                    if (list.length === 0) continue;
                    dom.innerHTML += `<h4 style="color:#fff;margin:15px 0 5px;">${cateName} - 第${page}页</h4>`;
                    list.forEach((item, i) => {
                        dom.innerHTML += `<div class="link-item"><a href="${item.url}" target="_blank">${item.name}</a><button class="del-btn" onclick="delLink('${cate}',${page},${i})">删除</button></div>`;
                    });
                }
            }
        }

        document.getElementById('cate').addEventListener('change', renderPageSelect);
        document.getElementById('delPageCate').addEventListener('change', renderDelPageSelect);

        function baiduSearch() {
            let kw = document.getElementById('baiduSearchInput').value;
            if (kw.trim()) window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(kw), '_self');
        }

        // 页面启动时构建导航
        rebuildNavMenu();
        // 显示首页
        showPage('首页', 'home');
    </script>
</body>
</html>
